name: Build Self-Contained APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Android project (self-contained)
        run: |
          set -eux

          mkdir -p android-self/app/src/main/java/com/example/iconpreview
          mkdir -p android-self/app/src/main/res/layout
          mkdir -p android-self/app/src/main/res/values
          mkdir -p android-self/app/src/main/res/drawable
          mkdir -p android-self/app/src/main/assets/icons

          cat > android-self/settings.gradle.kts <<'EOF'
          pluginManagement {
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
            }
          }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
              google()
              mavenCentral()
            }
          }
          rootProject.name = "IconPreviewSelfContained"
          include(":app")
          EOF

          cat > android-self/build.gradle.kts <<'EOF'
          plugins {
            id("com.android.application") version "8.3.2" apply false
          }
          EOF

          cat > android-self/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          EOF

          cat > android-self/app/build.gradle.kts <<'EOF'
          plugins {
            id("com.android.application")
          }

          android {
            namespace = "com.example.iconpreview"
            compileSdk = 34

            defaultConfig {
              applicationId = "com.example.iconpreview"
              minSdk = 24
              targetSdk = 34
              versionCode = 1
              versionName = "1.0"
            }

            buildTypes {
              release {
                isMinifyEnabled = false
              }
            }

            compileOptions {
              sourceCompatibility = JavaVersion.VERSION_17
              targetCompatibility = JavaVersion.VERSION_17
            }
          }

          dependencies {
            implementation("androidx.appcompat:appcompat:1.7.0")
          }
          EOF

          cat > android-self/app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application
              android:allowBackup="true"
              android:label="Breakcore Icon Preview"
              android:theme="@style/Theme.IconPreview">
              <activity
                android:name=".MainActivity"
                android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

          cat > android-self/app/src/main/java/com/example/iconpreview/MainActivity.java <<'EOF'
          package com.example.iconpreview;

          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
              super.onCreate(savedInstanceState);
              setContentView(R.layout.activity_main);
            }
          }
          EOF

          cat > android-self/app/src/main/res/layout/activity_main.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#050505">

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:padding="24dp">

                  <TextView
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="BREAKCORE ICON PREVIEW"
                      android:textColor="#F20B17"
                      android:textSize="22sp"
                      android:textStyle="bold" />

                  <TextView
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="16dp"
                      android:text="APK self-contained gerado no GitHub Actions com sucesso."
                      android:textColor="#FFD9D9"
                      android:textSize="16sp" />

                  <TextView
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="12dp"
                      android:text="Próximo passo: integrar seus ícones reais."
                      android:textColor="#F20B17"
                      android:textSize="14sp" />

              </LinearLayout>
          </ScrollView>
          EOF

          cat > android-self/app/src/main/res/values/themes.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="Theme.IconPreview" parent="Theme.AppCompat.DayNight.NoActionBar" />
          </resources>
          EOF

      - name: Build debug APK
        working-directory: android-self
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: self-contained-app-debug-apk
          path: android-self/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
